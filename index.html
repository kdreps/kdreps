<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KDREPS</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0a0a0a;
  color: white;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 1s forwards;
  animation-delay: 2.5s;
}

.logo-big {
  font-size: 70px;
  font-weight: 900;
  letter-spacing: 2px;
  color: white;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #fff,
    0 0 40px #fff;
  animation: scaleIn 1.2s ease;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 15px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  opacity: 0;
  animation: showNav 1s forwards;
  animation-delay: 2.8s;
}

.logo-small {
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 1px;
  text-shadow: 0 0 10px #fff;
}

.nav-left, .nav-right {
  display: flex;
  gap: 15px;
}

.nav-btn {
  font-weight: 700;
  padding: 6px 14px;
  background: transparent;
  border: 1px solid #333;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn:hover {
  border-color: white;
  background: white;
  color: black;
  transform: scale(1.1);
}

/* SEARCH */
.search {
  margin-top: 90px;
  display: flex;
  justify-content: center;
}

.search input {
  padding: 12px;
  width: 280px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  font-family: 'Montserrat';
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #111;
  border-radius: 14px;
  padding: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 10px #222;
}

.price {
  color: #00ff88;
  font-weight: 700;
}

/* ANIMACJE */
@keyframes scaleIn {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

@keyframes showNav {
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="logo-big">KDREPS</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-btn">KALKULATOR</div>
    <div class="nav-btn">QC</div>
  </div>

  <div class="logo-small">KDREPS</div>

  <div class="nav-right">
    <div class="nav-btn">SPREADSHEET</div>
    <div class="nav-btn">ULUBIONE</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" id="search" placeholder="Szukaj produktu...">
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<script>
const products = [
  { name: "AIR FORCE 1", price: 65.54 },
  { name: "JORDAN 4", price: 300 },
  { name: "BLUZA YEEZY GAP", price: 152.65 },
  { name: "PERFUMY CHANEL", price: 79.17 }
];

const container = document.getElementById("products");
const search = document.getElementById("search");

function render(list) {
  container.innerHTML = "";
  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <p>${p.name}</p>
        <p class="price">${p.price} zł</p>
      </div>
    `;
  });
}

search.addEventListener("input", () => {
  const val = search.value.toLowerCase();
  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(val)
  );
  render(filtered);
});

render(products);
</script>

</body>
</html>
