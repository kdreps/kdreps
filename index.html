<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>
:root {
  --bg: #e7e7e7;
  --text: #080a0f;
  --line: #cfcfcf;
}

/* RESET */
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: 72px;

  background: rgba(231, 231, 231, 0.96);
  border-bottom: 1px solid var(--line);

  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 16px;

  padding: 0 12px;
  overflow: hidden;
}

.brand {
  font-size: 28px;
  font-weight: 900;
}

/* NAV CENTER */
.nav-center {
  display: flex;
  align-items: center;
  gap: 10px;

  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
}

.nav-center::-webkit-scrollbar {
  display: none;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;

  border: 2px solid transparent;
  border-radius: 12px;
  padding: 6px 12px;

  font-size: 15px;
  font-weight: 700;

  text-decoration: none;
  color: inherit;
}

.nav-item.active {
  border-color: #0a0d13;
}

/* SVG IKONY */
.nav-icon {
  width: 18px !important;
  height: 18px !important;

  stroke: #0a0d13;
  stroke-width: 2;

  fill: none !important;

  flex-shrink: 0;
}

/* FIX NA BUG SVG */
svg {
  max-width: 100%;
  height: auto;
}

/* RIGHT */
.nav-icons {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  width: 38px;
  height: 38px;

  display: grid;
  place-items: center;

  border: 1px solid #222;
  background: #0f131b;
  color: white;

  border-radius: 6px;
  cursor: pointer;
}

/* ===== LAYOUT ===== */
.layout {
  display: grid;
  grid-template-columns: 150px 1fr;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 10px;
}

/* KATALOG */
.catalog h3 {
  font-size: 28px;
}

.catalog a {
  display: block;
  font-size: 18px;
  margin: 5px 0;
  text-decoration: none;
  color: inherit;
}

/* HERO */
.hero {
  text-align: center;
}

.hero h1 {
  font-size: 80px;
  margin: 0;
}

.hero p {
  font-size: 20px;
}

.hero-search {
  margin-top: 15px;
  border: 2px solid black;
  padding: 10px 20px;
  display: inline-block;
}

/* PRODUKTY */
.latest {
  margin-top: 40px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.card {
  background: #0f131b;
  color: white;
  padding: 10px;
  border-radius: 8px;
}

.card-media {
  height: 100px;
  background: #222;
  margin-bottom: 10px;
}

/* MOBILE */
@media (max-width: 900px) {
  .layout {
    grid-template-columns: 1fr;
  }

  .catalog {
    display: none;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="brand">KDREPS</div>

  <nav class="nav-center">

    <a class="nav-item active" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16" y1="16" x2="21" y2="21"></line>
      </svg>
      WYSZUKIWARKA
    </a>

    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <rect x="4" y="4" width="16" height="16"></rect>
      </svg>
      ŚLEDZENIE DOSTAWY
    </a>

    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <rect x="6" y="6" width="12" height="12"></rect>
      </svg>
      SPREADSHEET
    </a>

    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="8"></circle>
      </svg>
      CAŁY KATALOG
    </a>

    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h16v16H4z"></path>
      </svg>
      QUALITY CHECK
    </a>

    <a class="nav-item" href="#">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      NARZĘDZIA
    </a>

  </nav>

  <div class="nav-icons">
    <button class="icon-btn">♡</button>
    <button class="icon-btn">⚙</button>
  </div>
</header>

<!-- CONTENT -->
<div class="layout">

  <aside class="catalog">
    <h3>KATALOG</h3>
    <a href="#">BUTY</a>
    <a href="#">BLUZY</a>
    <a href="#">KOSZULKI</a>
    <a href="#">SPODNIE</a>
    <a href="#">SPODENKI</a>
  </aside>

  <main>
    <section class="hero">
      <h1>KDREPS</h1>
      <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>
      <div class="hero-search">WYSZUKIWARKA</div>
    </section>

    <section class="latest">
      <h2>OSTATNIO DODANE</h2>
      <div class="cards" id="product-cards"></div>
    </section>
  </main>

</div>

<script src="products.js"></script>
<script>
const container = document.getElementById('product-cards');
const items = (typeof products !== 'undefined' ? products : []).slice(0, 4);

container.innerHTML = items.map(item => `
  <div class="card">
    <div class="card-media"></div>
    <div>${item.name}</div>
    <div>$${item.price}</div>
  </div>
`).join('');
</script>

</body>
</html>
