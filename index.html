<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* ===== INTRO LOGO ===== */
.intro {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 60px;
  font-weight: 900;
  letter-spacing: 2px;
  animation: introAnim 2.5s forwards;
}

@keyframes introAnim {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
  50% { opacity: 1; }
  100% {
    transform: translate(-50%, -200%);
    opacity: 0;
  }
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 15px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 30px;
  opacity: 0;
  animation: showNav 1s forwards;
  animation-delay: 2.5s;
}

@keyframes showNav {
  to { opacity: 1; }
}

.nav-left, .nav-right {
  display: flex;
  gap: 10px;
}

.nav-btn {
  background: transparent;
  border: 1px solid #444;
  color: white;
  padding: 6px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

/* LOGO NA GÓRZE */
.logo-small {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: 900;
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
}

/* ===== HERO ===== */
.hero {
  margin-top: 140px;
  text-align: center;
  opacity: 0;
  animation: fadeIn 1s forwards;
  animation-delay: 2.8s;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.hero h1 {
  font-size: 64px;
  margin: 0;
}

.hero p {
  color: #aaa;
  margin: 10px 0 30px;
}

/* SEARCH */
.search input {
  width: 400px;
  max-width: 90%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
}

/* BUTTONY */
.hero-buttons {
  margin-top: 30px;
}

.hero-buttons a {
  text-decoration: none;
  margin: 0 10px;
}

.btn {
  padding: 12px 20px;
  border-radius: 20px;
  border: 1px solid #444;
  color: white;
}

.btn.primary {
  border-color: white;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .hero h1 {
    font-size: 36px;
  }

  .logo-small {
    font-size: 20px;
  }

  .nav-btn {
    font-size: 10px;
    padding: 5px 8px;
  }

}

</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">KDREPS</div>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-left">
    <button class="nav-btn">KALKULATOR</button>
    <button class="nav-btn">QC</button>
  </div>

  <div class="logo-small">KDREPS</div>

  <div class="nav-right">
    <button class="nav-btn">SPREADSHEET</button>
    <button class="nav-btn">ULUBIONE</button>
  </div>

</div>

<!-- HERO -->
<div class="hero">

  <h1>kdreps.pl</h1>
  <p>More than just your spreadsheet</p>

  <div class="search">
    <input type="text" placeholder="Szukaj produktu...">
  </div>

  <div class="hero-buttons">
    <a href="https://discord.gg/vJTNhqHSNh" target="_blank">
      <button class="btn">Dołącz do społeczności</button>
    </a>

    <button class="btn primary">Przeglądaj</button>
  </div>

</div>

</body>
</html>
