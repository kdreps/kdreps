<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 25px;
  background: rgba(10,10,10,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #1a1a1a;
  z-index: 1000;
}

/* LOGO */
.logo {
  font-size: 26px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(255,255,255,0.6);
}

/* NAV ITEM */
.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: #ccc;
  cursor: pointer;
  transition: 0.25s;
}

/* IKONY (białe outline) */
.icon {
  width: 16px;
  height: 16px;
  border: 1.5px solid white;
  border-radius: 3px;
}

/* HOVER */
.nav-item:hover {
  color: white;
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ===== HERO ===== */
.hero {
  margin-top: 120px;
  text-align: center;
}

/* KDREPS */
.hero h1 {
  font-size: 80px;
  font-weight: 900;
  margin: 0;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* OPIS */
.hero p {
  margin-top: 10px;
  color: #aaa;
}

/* SEARCH */
.search {
  margin-top: 30px;
}

.search input {
  width: 420px;
  max-width: 90%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #111;
  color: white;
  transition: 0.3s;
}

/* SEARCH GLOW */
.search input:focus {
  outline: none;
  border-color: white;
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

/* DISCORD */
.discord {
  margin-top: 15px;
}

.discord a {
  color: #aaa;
  text-decoration: none;
}

.discord a:hover {
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ===== KATALOG (po prawej) ===== */
.catalog {
  position: fixed;
  right: 20px;
  top: 100px;
  text-align: right;
}

.catalog h3 {
  margin-bottom: 10px;
}

.catalog div {
  color: #aaa;
  margin: 6px 0;
  cursor: pointer;
  transition: 0.2s;
}

.catalog div:hover {
  color: white;
  transform: translateX(-5px);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .navbar {
    flex-wrap: wrap;
    gap: 10px;
    height: auto;
    padding: 10px;
  }

  .hero h1 {
    font-size: 40px;
  }

  .catalog {
    display: none;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-item"><div class="icon"></div> WYSZUKIWARKA</div>
  <div class="nav-item"><div class="icon"></div> ŚLEDZENIE</div>

  <div class="logo">KDREPS</div>

  <div class="nav-item"><div class="icon"></div> SPREADSHEET</div>
  <div class="nav-item"><div class="icon"></div> KATALOG</div>
  <div class="nav-item"><div class="icon"></div> QC</div>
  <div class="nav-item"><div class="icon"></div> NARZĘDZIA</div>

</div>

<!-- HERO -->
<div class="hero">

  <h1>KDREPS</h1>
  <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>

  <div class="search">
    <input type="text" placeholder="Wyszukiwarka...">
  </div>

  <div class="discord">
    <a href="https://discord.gg/vJTNhqHSNh" target="_blank">
      Dołącz do społeczności
    </a>
  </div>

</div>

<!-- KATALOG -->
<div class="catalog">
  <h3>KATALOG</h3>
  <div>BUTY</div>
  <div>BLUZY</div>
  <div>KOSZULKI</div>
  <div>SPODNIE</div>
  <div>SPODENKI</div>
</div>

</body>
</html>
