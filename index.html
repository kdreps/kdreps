<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  background: rgba(10,10,10,0.8);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: 900;
  text-shadow: 0 0 12px rgba(255,255,255,0.6);
}

/* NAV ITEM */
.nav-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.25s ease;
}

/* HOVER */
.nav-item:hover {
  transform: scale(1.08);
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ===== HERO ===== */
.hero {
  margin-top: 160px;
  text-align: center;
}

/* DUŻY NAPIS */
.hero h1 {
  font-size: 70px;
  margin: 0;
  font-weight: 900;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* OPIS */
.hero p {
  margin-top: 10px;
  color: #aaa;
}

/* SEARCH */
.search {
  margin-top: 30px;
}

.search input {
  width: 420px;
  max-width: 90%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #111;
  color: white;
  transition: 0.3s;
}

/* SEARCH HOVER */
.search input:focus {
  outline: none;
  border-color: white;
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

/* DISCORD */
.discord {
  margin-top: 15px;
}

.discord a {
  color: #aaa;
  text-decoration: none;
  transition: 0.3s;
}

.discord a:hover {
  color: white;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .navbar {
    flex-wrap: wrap;
    gap: 10px;
  }

  .hero h1 {
    font-size: 40px;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="nav-item">🔍 WYSZUKIWARKA</div>
  <div class="nav-item">📦 ŚLEDZENIE DOSTAWY</div>
  
  <div class="logo">KDREPS</div>
  
  <div class="nav-item">📊 SPREADSHEET</div>
  <div class="nav-item">🛍️ CAŁY KATALOG</div>
  <div class="nav-item">🧪 QUALITY CHECK</div>
  <div class="nav-item">🛠️ NARZĘDZIA</div>
  <div class="nav-item">❤️</div>
  <div class="nav-item">⚙️</div>

</div>

<!-- HERO -->
<div class="hero">

  <h1>KDREPS</h1>
  <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>

  <div class="search">
    <input type="text" placeholder="Wyszukiwarka...">
  </div>

  <div class="discord">
    <a href="https://discord.gg/vJTNhqHSNh" target="_blank">
      Dołącz do społeczności
    </a>
  </div>

</div>

</body>
</html>
