<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KDREPS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
    }
    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      padding: 12px;
    }
    .card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
    }
    .card p {
      padding: 8px;
      font-size: 14px;
    }
    .price {
      color: #00ff88;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>KDREPS</header>

<div class="grid" id="products"></div>

<script>
const products = [
  {
    name: "Nike Hoodie",
    price: "120 zł",
    image: "https://via.placeholder.com/300",
    link: "#"
  },
  {
    name: "Jordan 4",
    price: "300 zł",
    image: "https://via.placeholder.com/300",
    link: "#"
  }
];

const container = document.getElementById("products");

products.forEach(p => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${p.image}" />
    <p>${p.name}</p>
    <p class="price">${p.price}</p>
  `;
  div.onclick = () => window.open(p.link, "_blank");
  container.appendChild(div);
});
</script>

</body>
</html>
