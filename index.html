<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KDREPS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* INTRO LOGO */
.intro {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2s;
}

.logo {
  font-size: 48px;
  font-weight: bold;
  animation: scaleIn 1.2s ease;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  opacity: 0;
  transform: translateY(-30px);
  animation: showHeader 1s ease forwards;
  animation-delay: 2.2s;
}

/* SEARCH */
.search {
  display: flex;
  justify-content: center;
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
  animation-delay: 2.5s;
}

.search input {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
  opacity: 0;
  animation: fadeIn 1s ease forwards;
  animation-delay: 2.8s;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.price {
  color: #00ff88;
  font-weight: bold;
}

.tag {
  font-size: 12px;
  opacity: 0.6;
}

/* ANIMATIONS */
@keyframes scaleIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

@keyframes showHeader {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="logo">KDREPS</div>
</div>

<header>KDREPS</header>

<div class="search">
  <input type="text" id="search" placeholder="Szukaj produktu...">
</div>

<div class="grid" id="products"></div>

<script>
const products = [
  { name: "AIR FORCE 1 BIAŁE/CZARNE", price: 65.54, tag: "TOP" },
  { name: "AIR FORCE 1 x SUPREME", price: 95.54, tag: "TOP" },
  { name: "AIR FORCE 1 x OFF WHITE", price: 176.13, tag: "TOP" },

  { name: "BLUZA POLO RALPH LAUREN", price: 87.77, tag: "TOP" },
  { name: "BLUZA YEEZY GAP", price: 152.65, tag: "TOP" },

  { name: "PERFUMY CHANEL 100ML", price: 79.17, tag: "TOP" }
];

const container = document.getElementById("products");
const searchInput = document.getElementById("search");

function render(list) {
  container.innerHTML = "";
  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <p>${p.name}</p>
        <p class="price">${p.price} zł</p>
        <p class="tag">${p.tag}</p>
      </div>
    `;
  });
}

searchInput.addEventListener("input", () => {
  const value = searchInput.value.toLowerCase();

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  render(filtered);
});

// start
render(products);
</script>

</body>
</html>
