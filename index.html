<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>
:root {
  --bg: #e7e7e7;
  --text: #080a0f;
  --line: #cfcfcf;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  width: 100%;
  height: 70px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 30px;

  background: rgba(231,231,231,0.95);
  border-bottom: 1px solid var(--line);

  z-index: 999;
}

.logo {
  font-size: 22px;
  font-weight: 900;
}

.nav-center {
  display: flex;
  gap: 28px;
  white-space: nowrap;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;

  font-size: 14px;
  font-weight: 600;

  cursor: pointer;
}

/* IKONY */
.nav-icon {
  width: 16px;
  height: 16px;
  stroke: #000;
  stroke-width: 2;
  fill: none;
}

/* PRAWO */
.nav-right {
  display: flex;
  gap: 12px;
}

.icon-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #333;
  border-radius: 8px;
  cursor: pointer;
}

/* ===== HERO ===== */
.hero {
  margin-top: 120px;
  text-align: center;
}

.hero h1 {
  font-size: 80px;
  margin: 0;
  font-weight: 900;
}

.hero p {
  margin-top: 10px;
}

.hero-search {
  margin-top: 20px;
  padding: 10px 20px;
  border: 1px solid black;
  display: inline-block;
}

/* ===== KATALOG ===== */
.catalog {
  position: fixed;
  left: 20px;
  top: 100px;
}

.catalog h3 {
  margin-bottom: 10px;
}

.catalog div {
  margin: 6px 0;
  cursor: pointer;
}

/* ===== PRODUKTY ===== */
.latest {
  margin-top: 40px;
  padding-left: 200px;
}

.cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.card {
  background: #0f131b;
  color: white;
  padding: 12px;
  border-radius: 10px;
}

.card-media {
  height: 120px;
  background: #222;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="logo">KDREPS</div>

  <div class="nav-center">

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <circle cx="8" cy="8" r="6"></circle>
        <line x1="13" y1="13" x2="17" y2="17"></line>
      </svg>
      WYSZUKIWARKA
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <rect x="3" y="3" width="12" height="12"></rect>
      </svg>
      ŚLEDZENIE DOSTAWY
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M3 3h12v12H3z"></path>
      </svg>
      SPREADSHEET
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <circle cx="9" cy="9" r="6"></circle>
      </svg>
      KATALOG
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <path d="M4 4h10v10H4z"></path>
      </svg>
      QC
    </div>

    <div class="nav-item">
      <svg class="nav-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="2"></circle>
      </svg>
      NARZĘDZIA
    </div>

  </div>

  <div class="nav-right">
    <div class="icon-btn">♡</div>
    <div class="icon-btn">⚙</div>
  </div>

</div>

<!-- HERO -->
<div class="hero">
  <h1>KDREPS</h1>
  <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>
  <div class="hero-search">WYSZUKIWARKA</div>
</div>

<!-- KATALOG -->
<div class="catalog">
  <h3>KATALOG</h3>
  <div>BUTY</div>
  <div>BLUZY</div>
  <div>KOSZULKI</div>
  <div>SPODNIE</div>
  <div>SPODENKI</div>
</div>

<!-- PRODUKTY -->
<div class="latest">
  <h2>OSTATNIO DODANE</h2>
  <div class="cards" id="product-cards"></div>
</div>

<script src="products.js"></script>
<script>
const container = document.getElementById('product-cards');
const items = (typeof products !== 'undefined' ? products : []).slice(0, 4);

container.innerHTML = items.map(item => `
  <div class="card">
    <div class="card-media"></div>
    <div>${item.name}</div>
    <div>$${item.price}</div>
  </div>
`).join('');
</script>

</body>
</html>
