<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #0b0b0b;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 14px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #0b0b0b;
  border-bottom: 1px solid #1a1a1a;
}

/* LOGO */
.logo {
  font-weight: 800;
  font-size: 20px;
  letter-spacing: 1px;
}

/* NAV LINKS */
.nav-links {
  display: flex;
  gap: 25px;
  font-size: 14px;
  color: #ccc;
}

.nav-links span {
  cursor: pointer;
  transition: 0.2s;
}

.nav-links span:hover {
  color: white;
}

/* RIGHT ICONS */
.nav-right {
  display: flex;
  gap: 15px;
  color: #aaa;
}

/* ===== HERO ===== */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

/* TITLE */
.hero h1 {
  font-size: 90px;
  font-weight: 800;
  margin: 0;
}

/* SUBTEXT */
.hero p {
  color: #aaa;
  margin-top: 10px;
}

/* SEARCH */
.search {
  margin-top: 30px;
}

.search input {
  width: 420px;
  max-width: 90%;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #1f1f1f;
  background: #111;
  color: white;
}

/* BUTTONS */
.buttons {
  margin-top: 25px;
  display: flex;
  gap: 15px;
}

.btn {
  padding: 12px 20px;
  border-radius: 20px;
  border: 1px solid #333;
  background: transparent;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  border-color: white;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

  .hero h1 {
    font-size: 40px;
  }

  .nav-links {
    display: none;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="logo">KDREPS</div>

  <div class="nav-links">
    <span>Spreadsheet</span>
    <span>Browse Finds</span>
    <span>Quality checks</span>
    <span>Outfits</span>
    <span>Sellers</span>
    <span>Tools</span>
  </div>

  <div class="nav-right">
    <span>♡</span>
    <span>⚙</span>
  </div>

</div>

<!-- HERO -->
<div class="hero">

  <h1>kdreps.pl</h1>
  <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>

  <div class="search">
    <input type="text" placeholder="Search...">
  </div>

  <div class="buttons">
    <a href="https://discord.gg/vJTNhqHSNh" target="_blank">
      <button class="btn">Dołącz do społeczności</button>
    </a>

    <button class="btn">Przeglądaj</button>
  </div>

</div>

</body>
</html>
