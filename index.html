<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KDREPS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 2.5s;
}

.logo-big {
  font-size: 60px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 20px #00ff88;
  animation: glow 1.5s ease;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 10px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  opacity: 0;
  animation: showNav 1s forwards;
  animation-delay: 2.8s;
}

.logo-small {
  font-size: 22px;
  font-weight: bold;
}

.nav-left, .nav-right {
  display: flex;
  gap: 10px;
}

.nav-btn {
  padding: 6px 12px;
  background: #111;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.nav-btn:hover {
  background: #00ff88;
  color: black;
  transform: scale(1.1);
}

/* SEARCH */
.search {
  margin-top: 80px;
  display: flex;
  justify-content: center;
}

.search input {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
  padding: 15px;
  margin-top: 20px;
}

.card {
  background: #111;
  border-radius: 12px;
  padding: 10px;
}

.price {
  color: #00ff88;
  font-weight: bold;
}

/* ANIMATIONS */
@keyframes glow {
  0% { opacity: 0; transform: scale(0.6); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

@keyframes showNav {
  to { opacity: 1; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="logo-big">KDREPS</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <div class="nav-btn">📊 Kalkulator</div>
    <div class="nav-btn">🔍 QC</div>
  </div>

  <div class="logo-small">KDREPS</div>

  <div class="nav-right">
    <div class="nav-btn">📋 Spreadsheet</div>
    <div class="nav-btn">❤️ Ulubione</div>
  </div>
</div>

<!-- SEARCH -->
<div class="search">
  <input type="text" id="search" placeholder="Szukaj...">
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<script>
const products = [
  { name: "AIR FORCE 1", price: 65.54 },
  { name: "JORDAN 4", price: 300 },
  { name: "BLUZA YEEZY GAP", price: 152.65 },
  { name: "PERFUMY CHANEL", price: 79.17 }
];

const container = document.getElementById("products");
const search = document.getElementById("search");

function render(list) {
  container.innerHTML = "";
  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <p>${p.name}</p>
        <p class="price">${p.price} zł</p>
      </div>
    `;
  });
}

search.addEventListener("input", () => {
  const val = search.value.toLowerCase();
  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(val)
  );
  render(filtered);
});

render(products);
</script>

</body>
</html>
