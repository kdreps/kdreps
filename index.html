<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>KDREPS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .filters {
      padding: 10px 20px;
    }

    .filters button {
      margin-right: 10px;
      padding: 8px 12px;
      background: #111;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .filters button:hover {
      background: #00ff88;
      color: black;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 15px;
      padding: 15px;
    }

    .card {
      background: #111;
      border-radius: 12px;
      padding: 10px;
    }

    .price {
      color: #00ff88;
      font-weight: bold;
    }

    .tag {
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>KDREPS</header>

<div class="filters">
  <button onclick="filterProducts('ALL')">ALL</button>
  <button onclick="filterProducts('BUTY')">BUTY</button>
  <button onclick="filterProducts('BLUZY')">BLUZY</button>
  <button onclick="filterProducts('PERFUMY')">PERFUMY</button>
</div>

<div class="grid" id="products"></div>

<script>
const products = [
  // BUTY
  { name: "AIR FORCE 1 BIAŁE/CZARNE", price: 65.54, tag: "TOP", category: "BUTY" },
  { name: "AIR FORCE 1 x SUPREME", price: 95.54, tag: "TOP", category: "BUTY" },
  { name: "AIR FORCE 1 x OFF WHITE", price: 176.13, tag: "TOP", category: "BUTY" },

  // BLUZY
  { name: "BLUZA POLO RALPH LAUREN", price: 87.77, tag: "TOP", category: "BLUZY" },
  { name: "BLUZA GALLERY DEPT", price: 127.31, tag: "TOP", category: "BLUZY" },
  { name: "BLUZA YEEZY GAP", price: 152.65, tag: "TOP", category: "BLUZY" },

  // PERFUMY
  { name: "PERFUMY CHANEL 35ML", price: 49.94, tag: "TOP", category: "PERFUMY" },
  { name: "PERFUMY CHANEL 50ML", price: 55.82, tag: "TOP", category: "PERFUMY" },
  { name: "PERFUMY CHANEL 100ML", price: 79.17, tag: "TOP", category: "PERFUMY" }
];

const container = document.getElementById("products");

function render(list) {
  container.innerHTML = "";
  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <p>${p.name}</p>
        <p class="price">${p.price} zł</p>
        <p class="tag">${p.tag}</p>
      </div>
    `;
  });
}

function filterProducts(category) {
  if (category === "ALL") {
    render(products);
  } else {
    const filtered = products.filter(p => p.category === category);
    render(filtered);
  }
}

// start
render(products);
</script>

</body>
</html>
