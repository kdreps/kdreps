<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KDREPS</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0a;
  color: white;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 70px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 0 30px;

  background: rgba(10,10,10,0.95);
  border-bottom: 1px solid #1a1a1a;

  z-index: 999;
}

.nav-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 28px;
  white-space: nowrap;
}

.nav-right {
  display: flex;
  gap: 12px;
  flex-shrink: 0; /* 🔥 zapobiega ucinaniu */
}


.icon-btn {
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.icon-btn:hover {
  border-color: white;
  box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

/* LOGO */
.logo {
  font-size: 22px;
  font-weight: 900;
  text-shadow: 0 0 10px rgba(255,255,255,0.6);
}

/* NAV ITEM */
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;

  color: #eee; /* 🔥 było szare — teraz premium */
  font-size: 14px;
  font-weight: 600;

  cursor: pointer;
  transition: 0.25s;
}

/* IKONA (jak screen – outline) */
.icon {
  width: 16px;
  height: 16px;
  border: 1.5px solid white;
  border-radius: 4px;
}

/* HOVER */
.nav-item:hover {
  color: #fff;
  transform: scale(1.08);
  text-shadow: 0 0 8px rgba(255,255,255,0.7);
}

/* PRAWA STRONA */
.nav-right {
  display: flex;
  align-items: center;
  gap: 15px;
}

/* IKONY PRAWE */
.icon-btn {
  width: 34px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #333;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.25s;
}

.icon-btn:hover {
  border-color: white;
  box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* ===== HERO ===== */
.hero {
  margin-top: 120px;
  text-align: center;
}

.hero h1 {
  font-size: 80px;
  margin: 0;
  font-weight: 900;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
}

.hero p {
  color: #aaa;
  margin-top: 10px;
}

/* SEARCH */
.search {
  margin-top: 30px;
}

.search input {
  width: 420px;
  max-width: 90%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #333;
  background: #111;
  color: white;
}

.search input:focus {
  outline: none;
  border-color: white;
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
}

/* DISCORD */
.discord {
  margin-top: 15px;
}

.discord a {
  color: #aaa;
  text-decoration: none;
}

.discord a:hover {
  color: white;
}

/* ===== KATALOG (LEWA STRONA) ===== */
.catalog {
  position: fixed;
  left: 20px;
  top: 100px;
}

.catalog h3 {
  margin-bottom: 10px;
}

.catalog div {
  color: #aaa;
  margin: 6px 0;
  cursor: pointer;
  transition: 0.2s;
}

.catalog div:hover {
  color: white;
  transform: translateX(5px);
}

/* MOBILE */
@media (max-width: 700px) {

  .nav-left .nav-item {
    display: none;
  }

  .catalog {
    display: none;
  }

  .hero h1 {
    font-size: 40px;
  }

}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

  <!-- LEWO -->
  <div class="logo">KDREPS</div>

  <!-- ŚRODEK -->
  <div class="nav-center">

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8" cy="8" r="6"></circle>
        <line x1="13" y1="13" x2="17" y2="17"></line>
      </svg>
      WYSZUKIWARKA
    </div>

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="12" height="12"></rect>
      </svg>
      ŚLEDZENIE
    </div>

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 3h12v12H3z"></path>
      </svg>
      SPREADSHEET
    </div>

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="6"></circle>
      </svg>
      KATALOG
    </div>

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 4h10v10H4z"></path>
      </svg>
      QC
    </div>

    <div class="nav-item">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="2"></circle>
      </svg>
      NARZĘDZIA
    </div>

  </div>

  <!-- PRAWO -->
  <div class="nav-right">
    <div class="icon-btn">♡</div>
    <div class="icon-btn">📋</div>
    <div class="icon-btn">⚙</div>
  </div>

</div>

<!-- HERO -->
<div class="hero">

  <h1>KDREPS</h1>
  <p>Itemy, obliczanie dostawy, qc i wiele więcej!</p>

  <div class="search">
    <input type="text" placeholder="Wyszukiwarka...">
  </div>

  <div class="discord">
    <a href="https://discord.gg/vJTNhqHSNh" target="_blank">
      Dołącz do społeczności
    </a>
  </div>

</div>

<!-- KATALOG -->
<div class="catalog">
  <h3>KATALOG</h3>
  <div>BUTY</div>
  <div>BLUZY</div>
  <div>KOSZULKI</div>
  <div>SPODNIE</div>
  <div>SPODENKI</div>
</div>

</body>
</html>
